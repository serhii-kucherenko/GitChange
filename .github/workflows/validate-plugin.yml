name: Validate Plugin

on:
  push:
    paths:
      - ".cursor-plugin/**"
      - ".cursor/commands/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"
  pull_request:
    paths:
      - ".cursor-plugin/**"
      - ".cursor/commands/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Parse plugin manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'))"

      - name: Verify skills directories exist
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const repoRoot = process.cwd();
            for (const manifest of ['.cursor-plugin/plugin.json', '.claude-plugin/plugin.json']) {
              const j = JSON.parse(fs.readFileSync(manifest, 'utf8'));
              for (const key of ['skills', 'agents']) {
                if (!j[key]) throw new Error(manifest + ' missing ' + key);
                const dir = path.resolve(repoRoot, j[key]);
                if (!fs.existsSync(dir)) throw new Error(key + ' dir not found: ' + dir);
              }
            }
          "

      - name: Verify Cursor slash commands exist
        run: |
          test -f .cursor/commands/gitchange.md
          test -f .cursor/commands/gitchange-dashboard.md
          test -f .cursor/commands/gitchange-update.md

      - name: Plugin script unit tests
        run: |
          pnpm vitest run packages/plugin/scripts/resolve-root.test.ts
          pnpm vitest run packages/plugin/scripts/ensure-up-to-date.test.ts

      - name: Validate install.sh syntax
        run: bash -n scripts/install.sh
