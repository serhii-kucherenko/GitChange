name: Validate Plugin

on:
  push:
    paths:
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"
  pull_request:
    paths:
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"

jobs:
  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse plugin manifest JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"

      - name: Verify skills directory from plugin.json
        run: |
          SKILLS=$(node -p "JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json','utf8')).skills")
          test -d "$SKILLS"

      - name: Validate install script syntax
        run: bash -n scripts/install.sh

      - name: Run plugin path resolver tests
        run: pnpm vitest run packages/plugin/scripts/resolve-root.test.ts
