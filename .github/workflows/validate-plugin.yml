name: Validate Plugin

on:
  push:
    paths:
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"
  pull_request:
    paths:
      - ".cursor-plugin/**"
      - ".claude-plugin/**"
      - "packages/plugin/**"
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - ".github/workflows/validate-plugin.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Parse plugin manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.cursor-plugin/plugin.json'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json'))"

      - name: Verify skills directories exist
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            for (const manifest of ['.cursor-plugin/plugin.json', '.claude-plugin/plugin.json']) {
              const j = JSON.parse(fs.readFileSync(manifest, 'utf8'));
              if (!j.skills) throw new Error(manifest + ' missing skills');
              const dir = path.resolve(path.dirname(manifest), j.skills);
              if (!fs.existsSync(dir)) throw new Error('skills dir not found: ' + dir);
            }
          "

      - name: Resolve-root unit tests
        run: pnpm vitest run packages/plugin/scripts/resolve-root.test.ts

      - name: Validate install.sh syntax
        run: bash -n scripts/install.sh
